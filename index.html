<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golfball Demo Beta</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #config-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #0f0;
            z-index: 10;
            width: 260px;
            display: none;
        }
        .config-group {
            margin-bottom: 12px;
        }
        .config-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .config-group input[type="range"] {
            width: 100%;
        }
        #toggle-config {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="toggle-config">⚙️ CONFIG</button>

    <div id="config-panel">
        <h3>Ajustes Beta</h3>
        <div class="config-group">
            <label>Velocidad Movimiento: <span id="val-speed">200</span></label>
            <input type="range" id="input-speed" min="50" max="500" value="200">
        </div>
        <div class="config-group">
            <label>Escala Sprite: <span id="val-scale">1</span></label>
            <input type="range" id="input-scale" min="0.5" max="5" step="0.1" value="1">
        </div>
        <div class="config-group">
            <label>Velocidad Animación: <span id="val-fps">10</span> fps</label>
            <input type="range" id="input-fps" min="1" max="30" value="10">
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const gameConfig = {
            speed: 200,
            scale: 1,
            animFps: 10
        };

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            fps: {
                target: 30, // Forzamos el loop del juego a 30 FPS fijos
                forceSetTimeOut: true
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 } }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let joystickBase;
        let joystickThumb;
        let isDragging = false;
        let joystickVector = { x: 0, y: 0 };
        let debugText;

        function preload() {
            // Carga de recursos (Verifica que GolfballWalk/ exista y se llame así tu JSON/PNG)
            this.load.atlas('golfball_idle', 'Characters/Golfball/GolfballIdle/GolfballaIdle.png', 'Characters/Golfball/GolfballIdle/GolfballIdle.json');
            this.load.atlas('golfball_walk', 'Characters/Golfball/GolfballWalk/GolfballWalk.png', 'Characters/Golfball/GolfballWalk/GolfballWalk.json');
            
            // Captura de errores de carga
            this.load.on('loaderror', function (fileObj) {
                if(debugText) debugText.setText('Error cargando: ' + fileObj.src);
            });
        }

        function create() {
            // Texto de Debug en pantalla
            debugText = this.add.text(10, 570, 'Cargando texturas...', { font: '14px monospace', fill: '#00ff00' }).setDepth(100);

            try {
                // Extraer de forma dinámica todos los frames que existan dentro de los JSONs
                const idleFrameNames = this.textures.get('golfball_idle').getFrameNames();
                const walkFrameNames = this.textures.get('golfball_walk').getFrameNames();

                if (idleFrameNames.length === 0 || walkFrameNames.length === 0) {
                    debugText.setText('Error: JSONs vacíos o rutas incorrectas.');
                    return;
                }

                const idleFrames = idleFrameNames.map(name => ({ key: 'golfball_idle', frame: name }));
                const walkFrames = walkFrameNames.map(name => ({ key: 'golfball_walk', frame: name }));

                // Crear animaciones
                this.anims.create({
                    key: 'idle',
                    frames: idleFrames,
                    frameRate: gameConfig.animFps,
                    repeat: -1
                });

                this.anims.create({
                    key: 'walk',
                    frames: walkFrames,
                    frameRate: gameConfig.animFps,
                    repeat: -1
                });

                // Crear Jugador
                player = this.physics.add.sprite(400, 300, 'golfball_idle', idleFrameNames[0]);
                player.setCollideWorldBounds(true);
                player.setScale(gameConfig.scale);
                player.play('idle');
                
                debugText.setText('Sprites cargados con éxito. 30 FPS fijos.');
            } catch (e) {
                debugText.setText('Error en Create: ' + e.message);
            }

            // --- JOYSTICK VIRTUAL ---
            joystickBase = this.add.circle(120, 480, 60, 0xffffff, 0.2).setDepth(10);
            joystickThumb = this.add.circle(120, 480, 30, 0x00ff00, 0.6).setDepth(11);
            joystickThumb.setInteractive({ draggable: true });

            this.input.on('drag', function (pointer, gameObject, dragX, dragY) {
                if (gameObject === joystickThumb) {
                    let distance = Phaser.Math.Distance.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                    if (distance <= 60) {
                        gameObject.x = dragX;
                        gameObject.y = dragY;
                    } else {
                        let angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                        gameObject.x = joystickBase.x + Math.cos(angle) * 60;
                        gameObject.y = joystickBase.y + Math.sin(angle) * 60;
                    }
                    joystickVector.x = (gameObject.x - joystickBase.x) / 60;
                    joystickVector.y = (gameObject.y - joystickBase.y) / 60;
                    isDragging = true;
                }
            });

            this.input.on('dragend', function (pointer, gameObject) {
                if (gameObject === joystickThumb) {
                    joystickThumb.x = joystickBase.x;
                    joystickThumb.y = joystickBase.y;
                    joystickVector = { x: 0, y: 0 };
                    isDragging = false;
                }
            });
        }

        function update() {
            if (!player || !player.anims) return;

            // Movimiento por Joystick
            if (isDragging && (Math.abs(joystickVector.x) > 0.1 || Math.abs(joystickVector.y) > 0.1)) {
                player.setVelocityX(joystickVector.x * gameConfig.speed);
                player.setVelocityY(joystickVector.y * gameConfig.speed);

                if (player.anims.currentAnim && player.anims.currentAnim.key !== 'walk') {
                    player.play('walk');
                }

                if (joystickVector.x < 0) player.flipX = true;
                else if (joystickVector.x > 0) player.flipX = false;
            } else {
                player.setVelocity(0);
                if (player.anims.currentAnim && player.anims.currentAnim.key !== 'idle') {
                    player.play('idle');
                }
            }
        }

        // --- MANEJO DEL PANEL DE CONFIGURACIÓN ---
        const btnToggle = document.getElementById('toggle-config');
        const panel = document.getElementById('config-panel');

        btnToggle.addEventListener('click', () => {
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('input-speed').addEventListener('input', (e) => {
            gameConfig.speed = parseInt(e.target.value);
            document.getElementById('val-speed').innerText = gameConfig.speed;
        });

        document.getElementById('input-scale').addEventListener('input', (e) => {
            gameConfig.scale = parseFloat(e.target.value);
            document.getElementById('val-scale').innerText = gameConfig.scale;
            if (player) player.setScale(gameConfig.scale);
        });

        document.getElementById('input-fps').addEventListener('input', (e) => {
            gameConfig.animFps = parseInt(e.target.value);
            document.getElementById('val-fps').innerText = gameConfig.animFps;
            if (game.anims) {
                const idleAnim = game.anims.get('idle');
                const walkAnim = game.anims.get('walk');
                if (idleAnim) idleAnim.frameRate = gameConfig.animFps;
                if (walkAnim) walkAnim.frameRate = gameConfig.animFps;
            }
        });
    </script>
</body>
</html>
