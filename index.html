<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golfball Demo Platformer Beta</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #config-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.95);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #0f0;
            z-index: 10;
            width: 260px;
            display: none;
        }
        .config-group {
            margin-bottom: 12px;
        }
        .config-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .config-group input[type="range"] {
            width: 100%;
        }
        #toggle-config {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="toggle-config">⚙️ CONFIG</button>

    <div id="config-panel">
        <h3>Ajustes Beta</h3>
        <div class="config-group">
            <label>Velocidad Movimiento: <span id="val-speed">200</span></label>
            <input type="range" id="input-speed" min="50" max="500" value="200">
        </div>
        <div class="config-group">
            <label>Escala Sprite: <span id="val-scale">0.1</span></label>
            <input type="range" id="input-scale" min="0.01" max="0.5" step="0.01" value="0.1">
        </div>
        <div class="config-group">
            <label>Velocidad Animación: <span id="val-fps">10</span> fps</label>
            <input type="range" id="input-fps" min="1" max="30" value="10">
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const logs = ["[SISTEMA]: Iniciando Modo Plataformas 2D..."];
        
        function addLog(text) {
            console.log(text);
            logs.push(text);
            if (logs.length > 15) logs.shift();
            if (window.debugTextDisplay) window.debugTextDisplay.setText(logs.join("\n"));
        }

        const gameConfig = {
            speed: 200,
            scale: 0.1,
            animFps: 10
        };

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            fps: { target: 30, forceSetTimeOut: true },
            physics: {
                default: 'arcade',
                arcade: { 
                    gravity: { y: 600 }, // ¡Gravedad activada para plataformero!
                    debug: true         // Muestra la caja de colisión (hitbox) en verde para pruebas
                }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let joystickBase;
        let joystickThumb;
        let isDragging = false;
        let joystickVector = { x: 0, y: 0 };
        let suelo; 

        // Estados del personaje
        letisCrouching = false;
        let isRising = false;

        function preload() {
            addLog("[PHASER]: Cargando recursos...");

            // Recursos anteriores
            this.load.atlas('golfball_idle', 'Characters/Golfball/GolfballIdle/GolfballIdle.png', 'Characters/Golfball/GolfballIdle/GolfballIdle.json');
            this.load.atlas('golfball_walk', 'Characters/Golfball/GolfballWalk/GolfballWalk.png', 'Characters/Golfball/GolfballWalk/GolfballWalk.json');
            
            // NUEVOS Recursos: Crouch y CrouchIdle
            this.load.atlas('golfball_crouch', 'Characters/Golfball/GolfballCrouch/GolfballCrouch.png', 'Characters/Golfball/GolfballCrouch/GolfballCrouch.json');
            this.load.atlas('golfball_crouchidle', 'Characters/Golfball/GolfballCrouchIdle/GolfballCrouchIdle.png', 'Characters/Golfball/GolfballCrouchIdle/GolfballCrouchIdle.json');

            this.load.on('loaderror', (fileObj) => addLog(`[ERROR 404]: No se encontró: ${fileObj.src}`));
        }

        function create() {
            window.debugTextDisplay = this.add.text(15, 15, logs.join("\n"), { 
                font: '13px monospace', fill: '#00ff00', backgroundColor: 'rgba(0,0,0,0.85)', padding: { x: 10, y: 10 }
            }).setDepth(1000);

            try {
                // Función auxiliar para obtener y ordenar frames automáticamente
                const crearAnim = (scene, key, atlasKey) => {
                    if (!scene.textures.exists(atlasKey)) return;
                    let frames = scene.textures.get(atlasKey).getFrameNames();
                    frames.sort((a, b) => parseInt(a) - parseInt(b));
                    scene.anims.create({
                        key: key,
                        frames: frames.map(name => ({ key: atlasKey, frame: name })),
                        frameRate: gameConfig.animFps,
                        repeat: (key === 'crouch') ? 0 : -1 // Crouch no se repite en loop, CrouchIdle sí
                    });
                    addLog(`[ANIMACIÓN]: ${key} lista (${frames.length} frames).`);
                };

                crearAnim(this, 'idle', 'golfball_idle');
                crearAnim(this, 'walk', 'golfball_walk');
                crearAnim(this, 'crouch', 'golfball_crouch');
                crearAnim(this, 'crouchidle', 'golfball_crouchidle');

                // Crear un suelo estático para que el personaje no caiga al infinito
                suelo = this.add.rectangle(400, 550, 800, 40, 0x333333);
                this.physics.add.existing(suelo, true);

                // Crear jugador
                let idleFrames = this.textures.get('golfball_idle').getFrameNames();
                player = this.physics.add.sprite(400, 300, 'golfball_idle', idleFrames[0]);
                player.setCollideWorldBounds(true);
                player.setScale(gameConfig.scale);
                player.play('idle');

                // Colisión entre jugador y suelo
                this.physics.add.collider(player, suelo);
                
                addLog("[JUGADOR]: Creado con gravedad.");
            } catch (e) {
                addLog("[ERROR CREATE]: " + e.message);
            }

            // --- JOYSTICK ---
            joystickBase = this.add.circle(120, 480, 60, 0xffffff, 0.2).setDepth(10);
            joystickThumb = this.add.circle(120, 480, 30, 0x00ff00, 0.6).setDepth(11);
            joystickThumb.setInteractive({ draggable: true });

            this.input.on('drag', function (pointer, gameObject, dragX, dragY) {
                if (gameObject === joystickThumb) {
                    let distance = Phaser.Math.Distance.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                    if (distance <= 60) {
                        gameObject.x = dragX;
                        gameObject.y = dragY;
                    } else {
                        let angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                        gameObject.x = joystickBase.x + Math.cos(angle) * 60;
                        gameObject.y = joystickBase.y + Math.sin(angle) * 60;
                    }
                    joystickVector.x = (gameObject.x - joystickBase.x) / 60;
                    joystickVector.y = (gameObject.y - joystickBase.y) / 60;
                    isDragging = true;
                }
            });

            this.input.on('dragend', function (pointer, gameObject) {
                if (gameObject === joystickThumb) {
                    joystickThumb.x = joystickBase.x;
                    joystickThumb.y = joystickBase.y;
                    joystickVector = { x: 0, y: 0 };
                    isDragging = false;
                }
            });
        }

        function update() {
            if (!player || !player.anims) return;

            // Reducimos sensibilidad: Debe estar en la parte muy inferior del joystick (Y > 0.75)
            let quiereAgacharse = isDragging && joystickVector.y > 0.75;

            if (quiereAgacharse) {
                // Cancela movimiento lateral por completo
                player.setVelocityX(0);

                if (!isCrouching && player.anims.currentAnim.key !== 'crouch' && player.anims.currentAnim.key !== 'crouchidle') {
                    isCrouching = true;
                    isRising = false;
                    player.play('crouch');
                    
                    // Al terminar la animación de agacharse (Crouch), pasa a CrouchIdle en bucle
                    player.once('animationcomplete-crouch', () => {
                        if (isCrouching) player.play('crouchidle');
                    });
                }
            } else {
                // Si el jugador soltó el botón hacia abajo o dejó de arrastrar
                if (isCrouching) {
                    isCrouching = false;
                    isRising = true;
                    
                    // Reproduce 'crouch' en reversa para levantarse
                    player.playReverse('crouch');
                    player.once('animationcomplete-crouch', () => {
                        isRising = false; // Ya se levantó por completo
                    });
                }

                // Si no se está levantando, permitimos movimiento normal
                if (!isRising) {
                    if (isDragging && Math.abs(joystickVector.x) > 0.15) {
                        player.setVelocityX(joystickVector.x * gameConfig.speed);
                        
                        if (player.body.touching.down && player.anims.currentAnim.key !== 'walk') {
                            player.play('walk');
                        }

                        if (joystickVector.x < 0) player.flipX = true;
                        else if (joystickVector.x > 0) player.flipX = false;
                    } else {
                        player.setVelocityX(0);
                        if (player.body.touching.down && player.anims.currentAnim.key !== 'idle') {
                            player.play('idle');
                        }
                    }
                }
            }
        }

        // --- MANEJO PANEL CONFIG ---
        const btnToggle = document.getElementById('toggle-config');
        const panel = document.getElementById('config-panel');
        btnToggle.addEventListener('click', () => panel.style.display = panel.style.display === 'block' ? 'none' : 'block');

        document.getElementById('input-speed').addEventListener('input', (e) => {
            gameConfig.speed = parseInt(e.target.value);
            document.getElementById('val-speed').innerText = gameConfig.speed;
        });
        document.getElementById('input-scale').addEventListener('input', (e) => {
            gameConfig.scale = parseFloat(e.target.value);
            document.getElementById('val-scale').innerText = gameConfig.scale;
            if (player) player.setScale(gameConfig.scale);
        });
        document.getElementById('input-fps').addEventListener('input', (e) => {
            gameConfig.animFps = parseInt(e.target.value);
            document.getElementById('val-fps').innerText = gameConfig.animFps;
            if (game.anims) {
                ['idle', 'walk', 'crouch', 'crouchidle'].forEach(key => {
                    let a = game.anims.get(key);
                    if (a) a.frameRate = gameConfig.animFps;
                });
            }
        });
    </script>
</body>
</html>
