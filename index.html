<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golfball Demo Platformer - Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #config-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.95);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #0f0;
            z-index: 10;
            width: 260px;
            display: none;
        }
        .config-group {
            margin-bottom: 12px;
        }
        .config-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .config-group input[type="range"] {
            width: 100%;
        }
        #toggle-config {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="toggle-config">⚙️ CONFIG</button>

    <div id="config-panel">
        <h3>Ajustes Beta</h3>
        <div class="config-group">
            <label>Velocidad Movimiento: <span id="val-speed">200</span></label>
            <input type="range" id="input-speed" min="50" max="500" value="200">
        </div>
        <div class="config-group">
            <label>Escala Sprite: <span id="val-scale">0.1</span></label>
            <input type="range" id="input-scale" min="0.01" max="0.5" step="0.01" value="0.1">
        </div>
        <div class="config-group">
            <label>Velocidad Animación: <span id="val-fps">10</span> fps</label>
            <input type="range" id="input-fps" min="1" max="30" value="10">
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        // Sistema de Registro de Mensajes en Pantalla
        const logs = ["[SISTEMA]: Inicializando Consola Plataforma 2D..."];
        
        function addLog(text) {
            console.log(text);
            logs.push(text);
            if (logs.length > 14) logs.shift(); // Evita que se salga de la pantalla
            if (window.debugTextDisplay) {
                window.debugTextDisplay.setText(logs.join("\n"));
            }
        }

        window.onerror = function (msg, url, line) {
            addLog(`[ERROR GLOBAL]: ${msg} en línea ${line}`);
            return false;
        };

        const gameConfig = {
            speed: 200,
            scale: 0.1,
            animFps: 10
        };

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            fps: {
                target: 30, // Loop forzado a 30 FPS constantes
                forceSetTimeOut: true
            },
            physics: {
                default: 'arcade',
                arcade: { 
                    gravity: { y: 600 }, 
                    debug: true // Muestra la hitbox verde en pantalla para evaluar desajustes
                }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let joystickBase;
        let joystickThumb;
        let isDragging = false;
        let joystickVector = { x: 0, y: 0 };
        let suelo;

        // Banderas de control para Agacharse
        let isCrouching = false;
        let isRising = false;

        function preload() {
            addLog("[PHASER]: Iniciando precarga de archivos...");

            // Definición de recursos (Verifica mayúsculas y minúsculas en tus archivos de GitHub)
            this.load.atlas('golfball_idle', 'Characters/Golfball/GolfballIdle/GolfballIdle.png', 'Characters/Golfball/GolfballIdle/GolfballIdle.json');
            this.load.atlas('golfball_walk', 'Characters/Golfball/GolfballWalk/GolfballWalk.png', 'Characters/Golfball/GolfballWalk/GolfballWalk.json');
            this.load.atlas('golfball_crouch', 'Characters/Golfball/GolfballCrouch/GolfballCrouch.png', 'Characters/Golfball/GolfballCrouch/GolfballCrouch.json');
            this.load.atlas('golfball_crouchidle', 'Characters/Golfball/GolfballCrouchIdle/GolfballCrouchIdle.png', 'Characters/Golfball/GolfballCrouchIdle/GolfballCrouchIdle.json');

            // Monitores de éxito y error
            this.load.on('filecomplete', function (key) {
                addLog(`[ÉXITO]: Cargado recurso -> ${key}`);
            });

            this.load.on('loaderror', function (fileObj) {
                addLog(`[ERROR 404]: No se encontró: ${fileObj.src}`);
            });
        }

        function create() {
            // Renderizar Consola Visual en la esquina superior izquierda
            window.debugTextDisplay = this.add.text(15, 15, logs.join("\n"), { 
                font: '13px monospace', 
                fill: '#00ff00',
                backgroundColor: 'rgba(0,0,0,0.85)',
                padding: { x: 10, y: 10 }
            }).setDepth(1000);

            addLog("[PHASER]: Ejecutando configuración de escena...");

            try {
                // Función interna automática para procesar y registrar animaciones desde el JSON
                const registrarAnimacion = (scene, keyAnim, keyAtlas) => {
                    if (!scene.textures.exists(keyAtlas)) {
                        addLog(`[ERROR]: Atlas ${keyAtlas} no está disponible en memoria.`);
                        return;
                    }
                    let frames = scene.textures.get(keyAtlas).getFrameNames();
                    frames.sort((a, b) => parseInt(a) - parseInt(b));
                    
                    scene.anims.create({
                        key: keyAnim,
                        frames: frames.map(name => ({ key: keyAtlas, frame: name })),
                        frameRate: gameConfig.animFps,
                        repeat: (keyAnim === 'crouch') ? 0 : -1 // Crouch se ejecuta una vez, CrouchIdle en bucle
                    });
                    addLog(`[ANIMACIÓN]: Registrada '${keyAnim}' (${frames.length} frames).`);
                };

                registrarAnimacion(this, 'idle', 'golfball_idle');
                registrarAnimacion(this, 'walk', 'golfball_walk');
                registrarAnimacion(this, 'crouch', 'golfball_crouch');
                registrarAnimacion(this, 'crouchidle', 'golfball_crouchidle');

                // Crear plataforma de soporte fija (Suelo)
                suelo = this.add.rectangle(400, 550, 800, 40, 0x333333);
                this.physics.add.existing(suelo, true);

                // Obtener el primer frame base para inicializar el sprite
                const idleFrames = this.textures.get('golfball_idle').getFrameNames();
                idleFrames.sort((a, b) => parseInt(a) - parseInt(b));

                player = this.physics.add.sprite(400, 300, 'golfball_idle', idleFrames[0]);
                player.setCollideWorldBounds(true);
                player.setScale(gameConfig.scale);
                player.play('idle');

                // Habilitar físicas de colisión
                this.physics.add.collider(player, suelo);
                
                addLog("[JUGADOR]: Inicializado en pantalla. Fijos: 30 FPS.");
            } catch (e) {
                addLog("[EXCEPCIÓN EN CREATE]: " + e.message);
            }

            // --- DISEÑO E INTERACCIÓN DEL JOYSTICK ---
            joystickBase = this.add.circle(120, 480, 60, 0xffffff, 0.2).setDepth(10);
            joystickThumb = this.add.circle(120, 480, 30, 0x00ff00, 0.6).setDepth(11);
            joystickThumb.setInteractive({ draggable: true });

            this.input.on('drag', function (pointer, gameObject, dragX, dragY) {
                if (gameObject === joystickThumb) {
                    let distance = Phaser.Math.Distance.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                    if (distance <= 60) {
                        gameObject.x = dragX;
                        gameObject.y = dragY;
                    } else {
                        let angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                        gameObject.x = joystickBase.x + Math.cos(angle) * 60;
                        gameObject.y = joystickBase.y + Math.sin(angle) * 60;
                    }
                    joystickVector.x = (gameObject.x - joystickBase.x) / 60;
                    joystickVector.y = (gameObject.y - joystickBase.y) / 60;
                    isDragging = true;
                }
            });

            this.input.on('dragend', function (pointer, gameObject) {
                if (gameObject === joystickThumb) {
                    joystickThumb.x = joystickBase.x;
                    joystickThumb.y = joystickBase.y;
                    joystickVector = { x: 0, y: 0 };
                    isDragging = false;
                }
            });
        }

        function update() {
            if (!player || !player.anims) return;

            // Sensibilidad reducida: requiere bajar el joystick a más del 75%
            let quiereAgacharse = isDragging && joystickVector.y > 0.75;

            if (quiereAgacharse) {
                // Cancelar inmediatamente todo desplazamiento horizontal lateral
                player.setVelocityX(0);

                if (!isCrouching && player.anims.currentAnim.key !== 'crouch' && player.anims.currentAnim.key !== 'crouchidle') {
                    isCrouching = true;
                    isRising = false;
                    player.play('crouch');
                    
                    // Al finalizar la transición 'crouch', mantiene el bucle en 'crouchidle'
                    player.once('animationcomplete-crouch', () => {
                        if (isCrouching) player.play('crouchidle');
                    });
                }
            } else {
                // Si estaba agachado y se soltó el mando hacia abajo
                if (isCrouching) {
                    isCrouching = false;
                    isRising = true;
                    
                    // Reproduce la animación de agachado en reversa para pararse
                    player.playReverse('crouch');
                    player.once('animationcomplete-crouch', () => {
                        isRising = false; // Se completó el levantamiento
                    });
                }

                // Si no se está ejecutando la acción de pararse, procesa movimiento ordinario
                if (!isRising) {
                    if (isDragging && Math.abs(joystickVector.x) > 0.15) {
                        player.setVelocityX(joystickVector.x * gameConfig.speed);
                        
                        if (player.body.touching.down && player.anims.currentAnim.key !== 'walk') {
                            player.play('walk');
                        }

                        if (joystickVector.x < 0) player.flipX = true;
                        else if (joystickVector.x > 0) player.flipX = false;
                    } else {
                        player.setVelocityX(0);
                        if (player.body.touching.down && player.anims.currentAnim.key !== 'idle') {
                            player.play('idle');
                        }
                    }
                }
            }
        }

        // --- INTERFAZ DEL PANEL DE CONFIGURACIÓN ---
        const btnToggle = document.getElementById('toggle-config');
        const panel = document.getElementById('config-panel');
        btnToggle.addEventListener('click', () => panel.style.display = panel.style.display === 'block' ? 'none' : 'block');

        document.getElementById('input-speed').addEventListener('input', (e) => {
            gameConfig.speed = parseInt(e.target.value);
            document.getElementById('val-speed').innerText = gameConfig.speed;
        });
        document.getElementById('input-scale').addEventListener('input', (e) => {
            gameConfig.scale = parseFloat(e.target.value);
            document.getElementById('val-scale').innerText = gameConfig.scale;
            if (player) player.setScale(gameConfig.scale);
        });
        document.getElementById('input-fps').addEventListener('input', (e) => {
            gameConfig.animFps = parseInt(e.target.value);
            document.getElementById('val-fps').innerText = gameConfig.animFps;
            if (game.anims) {
                ['idle', 'walk', 'crouch', 'crouchidle'].forEach(key => {
                    let a = game.anims.get(key);
                    if (a) a.frameRate = gameConfig.animFps;
                });
            }
        });
    </script>
</body>
</html>
