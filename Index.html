<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golfball Demo Beta</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: monospace;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Panel de Configuración */
        #config-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #0f0;
            z-index: 10;
            max-width: 280px;
            display: none; /* Se activa con el botón */
        }
        .config-group {
            margin-bottom: 12px;
        }
        .config-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .config-group input[type="range"] {
            width: 100%;
        }
        #toggle-config {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="toggle-config">⚙️ CONFIG</button>

    <div id="config-panel">
        <h3>Ajustes Beta</h3>
        <div class="config-group">
            <label>Velocidad: <span id="val-speed">200</span></label>
            <input type="range" id="input-speed" min="50" max="500" value="200">
        </div>
        <div class="config-group">
            <label>Escala (Tamaño): <span id="val-scale">1</span></label>
            <input type="range" id="input-scale" min="0.5" max="4" step="0.1" value="1">
        </div>
        <div class="config-group">
            <label>Frame Rate (Retro): <span id="val-fps">10</span> fps</label>
            <input type="range" id="input-fps" min="1" max="30" value="10">
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        // Variables globales de configuración modificables
        const gameConfig = {
            speed: 200,
            scale: 1,
            fps: 10
        };

        // Configuración de Phaser
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true, // Mantiene el estilo retro/pixelado sin desenfoque
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 } }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let joystickBase;
        let joystickThumb;
        let isDragging = false;
        let joystickVector = { x: 0, y: 0 };

        function preload() {
            // Carga de Spritesheets usando tus rutas relativas
            this.load.atlas('golfball_idle', 'Characters/Golfball/GolfballIdle/GolfballaIdle.png', 'Characters/Golfball/GolfballIdle/GolfballIdle.json');
            this.load.atlas('golfball_walk', 'Characters/Golfball/GolfballWalk/GolfballWalk.png', 'Characters/Golfball/GolfballWalk/GolfballWalk.json');
        }

        function create() {
            const scene = this;

            // 1. Crear animaciones desde el Atlas
            // Nota: El "prefix" depende de cómo se llamen los frames dentro de tu JSON (ej. "idle_0", "walk_0")
            // Si no tienen prefijo o cambia, ajusta el parámetro 'prefix' o usa 'start' y 'end'.
            this.anims.create({
                key: 'idle',
                frames: this.anims.generateFrameNames('golfball_idle', { start: 0, end: 5, prefix: '' }), 
                frameRate: gameConfig.fps,
                repeat: -1
            });

            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNames('golfball_walk', { start: 0, end: 5, prefix: '' }),
                frameRate: gameConfig.fps,
                repeat: -1
            });

            // 2. Crear Jugador
            player = this.physics.add.sprite(400, 300, 'golfball_idle');
            player.setCollideWorldBounds(true);
            player.play('idle');

            // 3. Crear Joystick Virtual (Móvil)
            // Dibujamos un joystick simple con figuras nativas de Phaser
            joystickBase = this.add.circle(120, 480, 60, 0x555555, 0.5).setScrollFactor(0).setDepth(10);
            joystickThumb = this.add.circle(120, 480, 30, 0x00ff00, 0.8).setScrollFactor(0).setDepth(11);

            // Hacerlo interactivo
            joystickThumb.setInteractive({ draggable: true });

            this.input.on('drag', function (pointer, gameObject, dragX, dragY) {
                if (gameObject === joystickThumb) {
                    // Calcular distancia desde el centro de la base
                    let distance = Phaser.Math.Distance.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                    
                    if (distance <= 60) {
                        gameObject.x = dragX;
                        gameObject.y = dragY;
                    } else {
                        // Limitar el movimiento al borde del joystick
                        let angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, dragX, dragY);
                        gameObject.x = joystickBase.x + Math.cos(angle) * 60;
                        gameObject.y = joystickBase.y + Math.sin(angle) * 60;
                    }

                    // Calcular vector de movimiento (-1 a 1)
                    joystickVector.x = (gameObject.x - joystickBase.x) / 60;
                    joystickVector.y = (gameObject.y - joystickBase.y) / 60;
                    isDragging = true;
                }
            });

            this.input.on('dragend', function (pointer, gameObject) {
                if (gameObject === joystickThumb) {
                    // Resetear posición al soltar
                    joystickThumb.x = joystickBase.x;
                    joystickThumb.y = joystickBase.y;
                    joystickVector = { x: 0, y: 0 };
                    isDragging = false;
                }
            });
        }

        function update() {
            // Aplicar velocidad basada en el joystick
            if (isDragging && (Math.abs(joystickVector.x) > 0.1 || Math.abs(joystickVector.y) > 0.1)) {
                player.setVelocityX(joystickVector.x * gameConfig.speed);
                player.setVelocityY(joystickVector.y * gameConfig.speed);

                if (player.anims.currentAnim.key !== 'walk') {
                    player.play('walk');
                }

                // Voltear sprite según dirección horizontal
                if (joystickVector.x < 0) {
                    player.flipX = true;
                } else if (joystickVector.x > 0) {
                    player.flipX = false;
                }
            } else {
                // Detenerse
                player.setVelocity(0);
                if (player.anims.currentAnim.key !== 'idle') {
                    player.play('idle');
                }
            }
        }

        // --- LÓGICA DEL PANEL DE CONFIGURACIÓN (DOM HTML) ---
        const btnToggle = document.getElementById('toggle-config');
        const panel = document.getElementById('config-panel');

        btnToggle.addEventListener('click', () => {
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        // Eventos Sliders
        document.getElementById('input-speed').addEventListener('input', (e) => {
            gameConfig.speed = parseInt(e.target.value);
            document.getElementById('val-speed').innerText = gameConfig.speed;
        });

        document.getElementById('input-scale').addEventListener('input', (e) => {
            gameConfig.scale = parseFloat(e.target.value);
            document.getElementById('val-scale').innerText = gameConfig.scale;
            if (player) player.setScale(gameConfig.scale);
        });

        document.getElementById('input-fps').addEventListener('input', (e) => {
            gameConfig.fps = parseInt(e.target.value);
            document.getElementById('val-fps').innerText = gameConfig.fps;
            
            // Actualizar los FPS de las animaciones en tiempo real si ya existen
            if (game.anims) {
                const idleAnim = game.anims.get('idle');
                const walkAnim = game.anims.get('walk');
                if (idleAnim) idleAnim.frameRate = gameConfig.fps;
                if (walkAnim) walkAnim.frameRate = gameConfig.fps;
            }
        });
    </script>
</body>
</html>
